<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stook · Cloud Storage Browser</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23111' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z'/%3E%3C/svg%3E" />
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
      <defs>
        <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></symbol>
        <symbol id="i-file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></symbol>
        <symbol id="i-file-text" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></symbol>
        <symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1.5"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></symbol>
        <symbol id="i-video" viewBox="0 0 24 24"><path d="m22 8-6 4 6 4z"/><rect x="2" y="6" width="14" height="12" rx="2"/></symbol>
        <symbol id="i-music" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></symbol>
        <symbol id="i-code" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></symbol>
        <symbol id="i-archive" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="5" rx="2"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></symbol>
        <symbol id="i-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></symbol>
        <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
        <symbol id="i-share" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
        <symbol id="i-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></symbol>
        <symbol id="i-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
        <symbol id="i-chevron-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></symbol>
        <symbol id="i-chevron-down" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></symbol>
        <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
        <symbol id="i-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
        <symbol id="i-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
        <symbol id="i-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
        <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
        <symbol id="i-database" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></symbol>
        <symbol id="i-arrow-up" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></symbol>
        <symbol id="i-arrow-down" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></symbol>
        <symbol id="i-folder-plus" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></symbol>
        <symbol id="i-home" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
        <symbol id="i-loader" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></symbol>
      </defs>
    </svg>

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6.5 12 3l8 3.5L12 10z" fill="currentColor" stroke="none"/>
            <path d="M4 11.5 12 8l8 3.5L12 15z" fill="currentColor" fill-opacity=".7" stroke="none"/>
            <path d="M4 16.5 12 13l8 3.5L12 20z" fill="currentColor" fill-opacity=".4" stroke="none"/>
          </svg>
        </div>
        <div class="brand-block">
          <div class="brand-text">Stook</div>
          <div class="brand-sub">Cloud Storage</div>
        </div>
      </div>

      <div class="bucket-picker" id="bucketPicker">
        <button class="bucket-picker-btn" id="bucketPickerBtn">
          <svg class="icon-sm"><use href="#i-database"/></svg>
          <span id="bucketLabel">—</span>
          <svg class="icon-xs caret"><use href="#i-chevron-down"/></svg>
        </button>
        <div class="bucket-menu" id="bucketMenu" hidden></div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-link active" data-view="files">
          <svg class="icon-sm"><use href="#i-folder"/></svg>
          <span>Files</span>
        </button>
      </nav>

      <div class="sidebar-spacer"></div>

      <div class="sidebar-meta">
        <div class="meta-row"><span class="meta-key">Endpoint</span><span class="meta-val" id="metaEndpoint">—</span></div>
        <div class="meta-row"><span class="meta-key">Region</span><span class="meta-val" id="metaRegion">—</span></div>
        <div class="meta-row"><span class="meta-key">Access</span><span class="meta-val" id="metaAccess">—</span></div>
        <div class="meta-row"><span class="meta-key">Style</span><span class="meta-val" id="metaStyle">path</span></div>
        <button class="nav-link disconnect" id="disconnectBtn" style="margin-top: 6px;">
          <svg class="icon-sm"><use href="#i-x"/></svg>
          <span>Disconnect</span>
        </button>
        <div class="brand-foot">by <b>Medianova</b></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <nav class="crumbs" id="crumbs"></nav>

        <div class="topbar-actions">
          <div class="search">
            <svg class="icon-sm search-icon"><use href="#i-search"/></svg>
            <input id="search" placeholder="Filter in this folder" />
            <button class="search-clear" id="searchClear" hidden><svg class="icon-xs"><use href="#i-x"/></svg></button>
          </div>
          <button class="btn btn-ghost" id="newFolderBtn">
            <svg class="icon-sm"><use href="#i-folder-plus"/></svg>
            <span>New folder</span>
          </button>
          <button class="btn btn-primary" id="uploadBtn">
            <svg class="icon-sm"><use href="#i-upload"/></svg>
            <span>Upload</span>
          </button>
          <input id="fileInput" type="file" multiple hidden />
        </div>
      </header>

      <section class="workspace">
        <div class="files-pane">
          <div class="selection-bar" id="selectionBar" hidden>
            <button class="btn btn-ghost btn-sm" id="selClear" aria-label="Clear">
              <svg class="icon-sm"><use href="#i-x"/></svg>
            </button>
            <span class="sel-count"><b id="selCount">0</b> selected</span>
            <div class="sel-spacer"></div>
            <button class="btn btn-ghost btn-sm" id="selDownload">
              <svg class="icon-sm"><use href="#i-download"/></svg><span>Download</span>
            </button>
            <button class="btn btn-ghost btn-sm" id="selShare">
              <svg class="icon-sm"><use href="#i-share"/></svg><span>Share</span>
            </button>
            <button class="btn btn-danger btn-sm" id="selDelete">
              <svg class="icon-sm"><use href="#i-trash"/></svg><span>Delete</span>
            </button>
          </div>

          <div class="list-header">
            <div class="lh-check"><input type="checkbox" id="checkAll"/></div>
            <button class="lh-col sort-btn" data-sort="name">
              <span>Name</span>
              <svg class="icon-xs sort-arrow"><use href="#i-arrow-up"/></svg>
            </button>
            <button class="lh-col col-size sort-btn" data-sort="size">
              <span>Size</span>
              <svg class="icon-xs sort-arrow"><use href="#i-arrow-up"/></svg>
            </button>
            <button class="lh-col col-mod sort-btn" data-sort="lastModified">
              <span>Modified</span>
              <svg class="icon-xs sort-arrow"><use href="#i-arrow-up"/></svg>
            </button>
            <div class="col-act"></div>
          </div>

          <div class="list-scroll" id="listScroll">
            <div class="list-spacer" id="listSpacer"></div>
            <div class="list-viewport" id="listViewport"></div>

            <div class="list-status" id="listStatus" hidden></div>
            <div class="list-empty" id="listEmpty" hidden>
              <svg class="empty-icon"><use href="#i-upload"/></svg>
              <div class="empty-title">This folder is empty</div>
              <div class="empty-sub">Drop files here, or use the Upload button</div>
            </div>
          </div>

          <div class="drag-overlay" id="dragOverlay" hidden>
            <div class="drag-card">
              <svg class="icon-lg"><use href="#i-upload"/></svg>
              <div>Drop to upload to <b id="dragPath">/</b></div>
            </div>
          </div>
        </div>

        <aside class="details" id="details" hidden>
          <div class="details-head">
            <div class="details-icon" id="detailsIcon"></div>
            <div class="details-name" id="detailsName"></div>
            <button class="btn btn-ghost btn-sm" id="detailsClose"><svg class="icon-sm"><use href="#i-x"/></svg></button>
          </div>
          <div class="details-body">
            <dl class="details-list" id="detailsList"></dl>
            <div class="details-actions">
              <button class="btn btn-ghost" id="detailsOpen"><svg class="icon-sm"><use href="#i-image"/></svg><span>Open</span></button>
              <button class="btn btn-ghost" id="detailsDownload"><svg class="icon-sm"><use href="#i-download"/></svg><span>Download</span></button>
              <button class="btn btn-ghost" id="detailsShare"><svg class="icon-sm"><use href="#i-share"/></svg><span>Share link</span></button>
              <button class="btn btn-ghost" id="detailsRename"><svg class="icon-sm"><use href="#i-edit"/></svg><span>Rename</span></button>
              <button class="btn btn-danger" id="detailsDelete"><svg class="icon-sm"><use href="#i-trash"/></svg><span>Delete</span></button>
            </div>
          </div>
        </aside>
      </section>

      <div class="uploads" id="uploads"></div>
    </main>

    <div class="modal" id="modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <div id="modalTitle"></div>
          <button class="icon-btn" id="modalClose" aria-label="Close"><svg class="icon-sm"><use href="#i-x"/></svg></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot" id="modalFoot"></div>
      </div>
    </div>

    <div class="preview" id="preview" hidden>
      <div class="preview-head">
        <div class="preview-title" id="previewName"></div>
        <div class="preview-spacer"></div>
        <button class="icon-btn" id="previewShare" title="Share"><svg class="icon-sm"><use href="#i-share"/></svg></button>
        <button class="icon-btn" id="previewDl" title="Download"><svg class="icon-sm"><use href="#i-download"/></svg></button>
        <button class="icon-btn" id="previewClose" aria-label="Close"><svg class="icon-sm"><use href="#i-x"/></svg></button>
      </div>
      <div class="preview-body" id="previewBody"></div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <div class="connect" id="connect" hidden>
      <div class="connect-card">
        <div class="connect-head">
          <div class="brand-mark connect-mark">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6.5 12 3l8 3.5L12 10z" fill="currentColor" stroke="none"/>
              <path d="M4 11.5 12 8l8 3.5L12 15z" fill="currentColor" fill-opacity=".7" stroke="none"/>
              <path d="M4 16.5 12 13l8 3.5L12 20z" fill="currentColor" fill-opacity=".4" stroke="none"/>
            </svg>
          </div>
          <div>
            <div class="connect-title">Connect to Stook</div>
            <div class="connect-sub">Enter the Access Key, Secret Key and Endpoint shown under <b>Stook → Credentials</b> in your Medianova customer panel.</div>
          </div>
        </div>
        <form class="connect-form" id="connectForm">
          <label>
            Endpoint URL
            <input type="text" id="cfEndpoint" placeholder="https://xxxxx.mncdn.com" autocomplete="off" />
          </label>
          <div class="connect-grid">
            <label>
              Region
              <select id="cfRegion">
                <option value="us-east-1">us-east-1</option>
                <option value="us-east-2">us-east-2</option>
                <option value="us-west-1">us-west-1</option>
                <option value="us-west-2">us-west-2</option>
                <option value="eu-west-1">eu-west-1</option>
                <option value="eu-west-2">eu-west-2</option>
                <option value="eu-west-3">eu-west-3</option>
                <option value="eu-central-1">eu-central-1</option>
                <option value="eu-north-1">eu-north-1</option>
                <option value="ap-south-1">ap-south-1</option>
                <option value="ap-northeast-1">ap-northeast-1</option>
                <option value="ap-northeast-2">ap-northeast-2</option>
                <option value="ap-southeast-1">ap-southeast-1</option>
                <option value="ap-southeast-2">ap-southeast-2</option>
                <option value="sa-east-1">sa-east-1</option>
                <option value="__custom__">Custom…</option>
              </select>
              <input type="text" id="cfRegionCustom" placeholder="custom-region" hidden />
            </label>
            <label>
              Default bucket <span class="hint">optional</span>
              <input type="text" id="cfBucket" placeholder="my-bucket" autocomplete="off" />
            </label>
          </div>
          <label>
            Access key
            <input type="text" id="cfAccessKey" autocomplete="off" spellcheck="false" required />
          </label>
          <label>
            Secret key
            <div class="password-wrap">
              <input type="password" id="cfSecretKey" autocomplete="off" spellcheck="false" required />
              <button type="button" class="icon-btn pw-toggle" id="pwToggle" tabindex="-1" title="Show/hide"><svg class="icon-sm"><use href="#i-search"/></svg></button>
            </div>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="cfPathStyle" checked />
            <span>Use path-style addressing <span class="hint">recommended — uses /bucket/key URLs instead of virtual-hosted subdomains</span></span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="cfRemember" checked />
            <span>Remember on this browser <span class="hint">stores endpoint, region &amp; access key locally — never the secret</span></span>
          </label>
          <div class="connect-error" id="connectError" hidden></div>
          <div class="connect-actions">
            <button type="submit" class="btn btn-primary" id="connectBtn">
              <svg class="icon-sm"><use href="#i-check"/></svg>
              <span>Test &amp; connect</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
